<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/fursat-website/">
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cart — Fursat</title>
  <link rel="stylesheet" href="https://use.typekit.net/rkl7bpr.css"/>
  <link rel="stylesheet" href="assets/product.css"/>
  <style>
    .cart-page{padding:48px 0 80px}
    .cart-page h1{font-family:var(--font-head);font-size:2rem;font-weight:400;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
    .cart-layout{display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:start}
    .cart-empty{text-align:center;padding:80px 0}
    .cart-empty p{color:var(--muted);margin-bottom:24px}
    .cart-item{display:grid;grid-template-columns:100px 1fr auto;gap:20px;align-items:center;padding:20px 0;border-bottom:1px solid var(--border)}
    .cart-item img{width:100px;height:125px;object-fit:cover;object-position:top}
    .cart-item-name{font-size:.95rem;font-weight:500;margin-bottom:4px}
    .cart-item-variant{font-size:.8rem;color:var(--muted)}
    .cart-item-price{font-size:.9rem;margin-top:8px}
    .qty-row{display:flex;align-items:center;gap:12px;margin-top:12px}
    .qty-btn{width:28px;height:28px;border:1px solid var(--border);background:none;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
    .qty-btn:hover{background:var(--ink);color:var(--cream)}
    .qty-num{font-size:.9rem;min-width:20px;text-align:center}
    .remove-btn{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;margin-top:8px;text-decoration:underline}
    .cart-summary{background:#fff;padding:28px;border:1px solid var(--border);position:sticky;top:100px}
    .summary-title{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:20px}
    .summary-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:12px}
    .summary-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:700;padding-top:16px;border-top:1px solid var(--border);margin-top:8px}
    .checkout-btn{width:100%;margin-top:20px;padding:16px;background:var(--ink);color:var(--cream);border:none;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s}
    .checkout-btn:hover{background:var(--olive)}
    .wa-checkout{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:14px;border:1px solid #25d366;color:#25d366;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;cursor:pointer;background:none;transition:background .2s,color .2s}
    .wa-checkout:hover{background:#25d366;color:#fff}
    .shipping-note{font-size:.75rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
    @media(max-width:768px){.cart-layout{grid-template-columns:1fr}.cart-summary{position:static}}
  </style>
  <script src="assets/cart.js" defer></script>
</head>

<script>
function renderCart() {
  const cart = getCart();
  const el = document.getElementById('cart-content');
  if (!cart.length) {
    el.innerHTML = '<div class="cart-empty"><p>Your cart is empty.</p><a href="collections/all.html" style="display:inline-block;padding:14px 32px;background:var(--ink);color:var(--cream);font-size:.8rem;letter-spacing:.1em;text-transform:uppercase">Continue Shopping</a></div>';
    return;
  }
  const total = cartTotal();
  const shipping = total >= 3000 ? 0 : 150;
  const items = cart.map(i => `
    <div class="cart-item">
      <img src="assets/products/${i.image}" alt="${i.title}" onerror="this.src='/assets/SMR08790.jpg'"/>
      <div>
        <p class="cart-item-name">${i.title}</p>
        <p class="cart-item-price">₹${Number(i.price).toLocaleString('en-IN')}</p>
        <div class="qty-row">
          <button class="qty-btn" onclick="updateQty(${i.variantId}, ${i.qty - 1}); renderCart()">−</button>
          <span class="qty-num">${i.qty}</span>
          <button class="qty-btn" onclick="updateQty(${i.variantId}, ${i.qty + 1}); renderCart()">+</button>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${i.variantId}); renderCart()">Remove</button>
      </div>
      <div style="font-weight:600;font-size:.95rem">₹${(i.price * i.qty).toLocaleString('en-IN')}</div>
    </div>`).join('');

  const waMsg = encodeURIComponent('Hi! I want to place an order:\n' + cart.map(i => `• ${i.title} x${i.qty} — ₹${(i.price*i.qty).toLocaleString('en-IN')}`).join('\n') + `\n\nTotal: ₹${(total+shipping).toLocaleString('en-IN')}`);

  el.innerHTML = `
    <div class="cart-layout">
      <div>${items}</div>
      <div class="cart-summary">
        <p class="summary-title">Order Summary</p>
        <div class="summary-row"><span>Subtotal</span><span>₹${total.toLocaleString('en-IN')}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? 'Free' : '₹' + shipping}</span></div>
        <div class="summary-total"><span>Total</span><span>₹${(total+shipping).toLocaleString('en-IN')}</span></div>
        <button class="checkout-btn" onclick="window.location.href='/checkout.html'">Proceed to Checkout</button>
        <button class="wa-checkout" onclick="window.open('https://wa.me/919739283637?text=${waMsg}','_blank')">

          Order via WhatsApp
        </button>
        <p class="shipping-note">Free shipping on orders above ₹3,000<br>Made to order — ships in 7–10 days</p>
